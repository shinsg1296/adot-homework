<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"><title>숙제 관리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"></noscript>
<style>
:root{
  --bg:#F6F2EC;--surface:#FFFFFF;--surface-alt:#FBF7F1;--surface-sunk:#F0E9DF;
  --ink:#2A231D;--ink-muted:#6E6356;--ink-faint:#A39686;--on-brand:#FFFCF8;
  --line:#ECE4D8;--line-strong:#DCCFBC;
  --brand:#B5562E;--brand-soft:#F7E9DD;--brand-dark:#8E3F1F;--brand-line:#E8CDB8;
  --accent:#5E7152;--accent-soft:#E9EEE3;--accent-line:#C7D3BA;
  --success:#4E7A4C;--success-soft:#E8F0E3;--success-line:#BFD6B8;
  --danger:#B23A33;--danger-soft:#F7E5E0;--danger-line:#E6C2B6;
  --warning:#A4761B;--warning-soft:#F6ECD7;--warning-line:#E6D2A8;
  --focus-ring:rgba(181,86,46,.20);--shadow:0 6px 18px rgba(74,55,40,.07);
  --r-tile:12px;--r-card:16px;--r-btn:13px;--r-pill:999px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--ink);padding:1.1rem;max-width:680px;margin:0 auto;-webkit-font-smoothing:antialiased;}
svg.ic{display:inline-block;vertical-align:middle;flex:none;}
.itile{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:var(--r-tile);background:var(--brand-soft);color:var(--brand);flex:none;}
.itile svg{width:21px;height:21px;}
h1{font-size:21px;font-weight:800;margin-bottom:1rem;display:flex;align-items:center;gap:11px;letter-spacing:-.01em;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);padding:1rem 1.1rem;margin-bottom:.85rem;box-shadow:var(--shadow);}
label{font-size:13px;color:var(--ink-muted);display:block;margin-bottom:6px;font-weight:600;}
input,select,textarea{width:100%;font-size:15px;padding:10px;border:1px solid var(--line-strong);border-radius:var(--r-tile);outline:none;font-family:inherit;background:var(--surface);color:var(--ink);transition:border-color .15s,box-shadow .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--focus-ring);}
.btn{width:100%;padding:13px;font-size:16px;font-weight:700;border:none;border-radius:var(--r-btn);cursor:pointer;background:var(--brand);color:var(--on-brand);margin-top:.4rem;display:inline-flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;transition:background .15s,transform .15s;}
.btn:hover{background:var(--brand-dark);}.btn:active{transform:scale(.99);}
.btn:disabled{opacity:.5;cursor:default;}
.btn svg.ic{width:18px;height:18px;}
.btn-ok{background:var(--success);}.btn-ok:hover{background:#3F6A3E;}
.btn-ghost{background:var(--surface);color:var(--brand);border:1px solid var(--brand-line);}
.hidden{display:none!important;}
.row{display:flex;gap:8px;}.row>*{flex:1;}
.seg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.4rem;}
.seg button{flex:0 0 auto;padding:7px 13px;border:1px solid var(--line-strong);border-radius:var(--r-pill);background:var(--surface);color:var(--ink);font-size:13px;font-weight:600;cursor:pointer;}
.seg button.on{background:var(--brand);color:var(--on-brand);border-color:var(--brand);}
.whorow{display:flex;align-items:center;justify-content:space-between;}
.whorow .who{display:flex;align-items:center;gap:9px;}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;border-radius:var(--r-pill);padding:2px 9px;}
.b-wait{background:var(--surface-sunk);color:var(--ink-muted);}
.b-sub{background:var(--warning-soft);color:var(--warning);border:1px solid var(--warning-line);}
.b-ok{background:var(--success-soft);color:var(--success);border:1px solid var(--success-line);}
.b-no{background:var(--danger-soft);color:var(--danger);border:1px solid var(--danger-line);}
.hw{border:1px solid var(--line);border-radius:var(--r-tile);padding:11px 12px;margin-bottom:8px;background:var(--surface-alt);}
.hw-top{display:flex;align-items:center;gap:8px;justify-content:space-between;}
.hw-title{font-weight:700;font-size:14px;}
.hw-meta{font-size:12px;color:var(--ink-muted);margin-top:3px;line-height:1.5;}
.hw-photo{margin-top:8px;}.hw-photo img{max-width:130px;border-radius:8px;border:1px solid var(--line-strong);}
.stu-head{display:flex;align-items:center;gap:10px;padding:11px 4px;cursor:pointer;border-bottom:1px solid var(--line);}
.stu-name{font-weight:700;font-size:15px;}
.stu-meta{margin-left:auto;font-size:12px;color:var(--ink-muted);}
.empty{padding:2rem;text-align:center;color:var(--ink-muted);font-size:14px;}
.thumb-prev{max-width:160px;max-height:200px;border-radius:10px;border:1px solid var(--line-strong);margin-top:8px;}
.muted{color:var(--ink-muted);font-size:13px;}
.status{font-size:13px;margin-top:9px;text-align:center;min-height:18px;}
.status.ok{color:var(--success);}.status.err{color:var(--danger);}
.sc-item{border:1px solid var(--line);border-radius:var(--r-tile);padding:9px 10px;margin-bottom:8px;background:var(--surface-alt);}
.sc-del{flex:0 0 auto!important;width:auto;background:var(--danger-soft);color:var(--danger);border:1px solid var(--danger-line);border-radius:var(--r-tile);padding:0 13px;font-weight:700;cursor:pointer;font-size:13px;}
.b-fixed{background:var(--success-soft);color:var(--success);border:1px solid var(--success-line);}
.b-expect{background:var(--warning-soft);color:var(--warning);border:1px solid var(--warning-line);}
.sc-row{display:flex;gap:8px;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;line-height:1.5;}
.sc-row:last-child{border-bottom:none;}
.sc-tp{flex:0 0 auto;font-weight:700;font-size:11px;color:var(--brand-dark);background:var(--brand-soft);border-radius:var(--r-pill);padding:2px 8px;}
.sc-src{font-weight:600;}
.sc-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.sc-mini{font-size:12px;color:var(--ink-faint);}
.un-grp{margin-top:10px;padding-top:9px;border-top:1px solid var(--line);}
.un-grp:first-child{border-top:none;padding-top:0;}
.un-h{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.un-wrap{display:flex;flex-wrap:wrap;gap:6px;}
.un{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;padding:6px 11px;border-radius:var(--r-pill);cursor:pointer;border:1px solid;user-select:none;-webkit-user-select:none;transition:background .12s,color .12s,border-color .12s;}
.un small{font-weight:500;opacity:.85;font-size:11px;}
.un.st0{background:var(--surface-sunk);color:var(--ink-muted);border-color:var(--line-strong);}
.un.st1{background:var(--warning-soft);color:var(--warning);border-color:var(--warning-line);}
.un.st2{background:var(--success-soft);color:var(--success);border-color:var(--success-line);}
.un-legend{margin-top:11px;font-size:11px;color:var(--ink-faint);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.un-legend .un{cursor:default;padding:3px 9px;font-size:11px;}
.un-sub{font-size:12px;font-weight:700;color:var(--ink-muted);margin:9px 0 5px;}
.q-wrap{display:flex;flex-wrap:wrap;gap:5px;}
.qcell{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:31px;padding:0 6px;font-size:12.5px;font-weight:700;border-radius:9px;cursor:pointer;border:1px solid;user-select:none;-webkit-user-select:none;transition:background .12s,color .12s,border-color .12s;}
.qcell.st0{background:var(--surface-sunk);color:var(--ink-faint);border-color:var(--line);}
.qcell.st1{background:var(--warning-soft);color:var(--warning);border-color:var(--warning-line);}
.qcell.st2{background:var(--success-soft);color:var(--success);border-color:var(--success-line);}
.ss-fixed{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:var(--ink);}
.ss-fixed .sf-tag{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:var(--r-pill);padding:2px 9px;}
.sc-sub label{margin-top:0;margin-bottom:4px;}
.yrwrap{display:flex;gap:7px;flex-wrap:wrap;}
.yrchk{display:inline-flex;align-items:center;gap:5px;font-size:13.5px;font-weight:700;color:var(--ink);background:var(--surface);border:1px solid var(--line-strong);border-radius:var(--r-pill);padding:6px 13px;cursor:pointer;}
.yrchk input{width:auto;margin:0;accent-color:var(--brand);}
.gsel{border:1px solid var(--line-strong);border-radius:var(--r-tile);padding:9px;background:var(--surface-alt);}
.gsel-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.gsel-all{width:auto;flex:0 0 auto;font-size:12px;font-weight:700;padding:5px 12px;border:1px solid var(--brand-line);border-radius:var(--r-pill);background:var(--brand-soft);color:var(--brand-dark);cursor:pointer;margin:0;}
.gsel-info{font-size:12px;color:var(--ink-muted);font-weight:600;}
.gsel-hint{font-size:11px;color:var(--ink-faint);margin-bottom:6px;}
.gsel-cells{display:flex;flex-wrap:wrap;gap:5px;touch-action:none;-webkit-user-select:none;user-select:none;}
.gcell-s{display:inline-flex;align-items:center;justify-content:center;min-width:36px;height:33px;padding:0 8px;font-size:12.5px;font-weight:700;border-radius:8px;border:1px solid var(--line-strong);background:var(--surface);color:var(--ink-muted);cursor:pointer;}
.gcell-s.on{background:var(--brand);color:var(--on-brand);border-color:var(--brand);}
.bkpass{max-height:340px;overflow-y:auto;}
.bkg{display:flex;align-items:center;gap:9px;padding:5px 0;border-bottom:1px solid var(--line);}
.bkg:last-child{border-bottom:none;}
.bkg-l{flex:0 0 42px;font-size:12px;font-weight:800;color:var(--ink);}
.bkg .gsel-cells{touch-action:none;}
</style></head><body>
<h1><span class="itile"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="m9 14 2 2 4-4"/></svg></span>숙제 관리</h1>

<div class="card" id="loginCard"><label>에이닷 아이디로 로그인</label>
<input id="adotId" placeholder="에이닷 아이디" autocapitalize="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')doLogin()">
<button class="btn" id="loginBtn" onclick="doLogin()">로그인</button>
<div class="status" id="loginMsg"></div></div>

<div id="appArea" class="hidden">
<div class="card whorow"><span class="who"><span class="itile"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 21c0-3.6 3.1-6 7-6s7 2.4 7 6"/></svg></span><span><b id="who"></b><span id="roleTag" class="muted"></span></span></span>
<span onclick="logout()" class="muted" style="cursor:pointer;text-decoration:underline;">로그아웃</span></div>

<!-- 학생 화면 -->
<div id="studentView" class="hidden">
  <div class="seg" id="stuMain"><button class="on" onclick="stuMainPick('hw')">내 숙제</button><button onclick="stuMainPick('scope')">시험범위</button></div>
  <div id="stuHwWrap">
    <div class="seg" id="stuRange"><button class="on" data-r="today" onclick="stuRangePick('today')">오늘</button><button data-r="week" onclick="stuRangePick('week')">이번주</button><button data-r="all" onclick="stuRangePick('all')">전체</button></div>
    <div id="stuList"></div>
  </div>
  <div id="stuScopeWrap" class="hidden">
    <div class="card" id="ssHead">
      <div class="ss-fixed hidden" id="ssAuto"></div>
      <div id="ssPicker">
        <div class="row"><div><label>학교</label><input id="ssSchool" placeholder="예: 동신여고"></div><div><label>학년</label><select id="ssGrade"><option>고1</option><option>고2</option><option>고3</option><option>중1</option><option>중2</option><option>중3</option></select></div></div>
        <button class="btn" onclick="loadStuScope()" style="margin-top:8px;"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4a7 7 0 1 0 0 14 7 7 0 0 0 0-14zM21 21l-4.3-4.3"/></svg>시험범위 보기</button>
      </div>
    </div>
    <div id="ssList"></div>
    <div class="card" id="ssSubCard" style="margin-top:4px;">
      <div class="sc-head"><b>내 시험범위 올리기</b><span class="sc-mini">작성 → 선생님 승인 시 등록</span><span style="margin-left:auto;"><button class="sc-del" id="ssSubToggle" onclick="ssSubToggle()" style="background:var(--surface);color:var(--brand);border-color:var(--brand-line);">작성하기</button></span></div>
      <div id="ssSubBody" class="hidden">
        <div class="sc-mini" id="ssSubWho" style="margin:2px 0 8px;"></div>
        <div class="row"><div><label>시험명</label><select id="ssSubExam"><option>1학기 중간고사</option><option>1학기 기말고사</option><option>2학기 중간고사</option><option>2학기 기말고사</option></select></div><div><label>시험일</label><input id="ssSubDate" type="date"></div></div>
        <label style="margin-top:10px;">시험범위 항목</label>
        <div id="ssSubItems"></div>
        <button class="btn btn-ghost" onclick="addScopeItem(null,'ssSubItems')" style="margin-top:2px;"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>항목 추가</button>
        <button class="btn btn-ok" id="ssSubBtn" onclick="ssSubmit()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg>올리기 (선생님 승인 요청)</button>
        <div class="status" id="ssSubMsg"></div>
      </div>
    </div>
    <div class="card" id="briefCard" style="margin-top:4px;">
      <div class="sc-head"><b>시험범위 바뀌었나요?</b></div>
      <div class="sc-mini" style="margin:2px 0 7px;">중간에 추가/제외된 게 있으면 선생님께 알려주세요.</div>
      <textarea id="briefMsg" rows="2" placeholder="예: 천재 조수경 영어1 3과 빠지고 4과 확정됐어요!"></textarea>
      <button class="btn btn-ok" id="briefBtn" onclick="sendBrief()" style="margin-top:7px;"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg>선생님께 알리기</button>
      <div class="status" id="briefStatus"></div>
    </div>
  </div>
</div>

<!-- 선생님 화면 -->
<div id="teacherView" class="hidden">
  <div class="seg" id="tTab"><button class="on" onclick="tTabPick('assign')">숙제 배정</button><button onclick="tTabPick('status')">현황</button><button onclick="tTabPick('scope')">시험범위<span id="briefDot" class="badge b-no hidden" style="margin-left:5px;padding:1px 6px;"></span></button></div>
  <!-- 배정 -->
  <div id="tAssign">
    <div class="card">
      <label>학생 선택</label><select id="aStu"></select>
      <div class="row" style="margin-top:8px;"><div><label>과목/유형</label><input id="aSubj" placeholder="예: 독해끝 문제스킬편2"></div><div><label>기한</label><input id="aDue" type="date"></div></div>
      <label style="margin-top:8px;">범위</label><input id="aRange" placeholder="예: 6강~7강 빈칸">
      <label style="margin-top:8px;">숙제 내용</label><textarea id="aBody" rows="3" placeholder="구체적 지시 (선택)"></textarea>
      <button class="btn" id="aBtn" onclick="assignHw()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>숙제 배정</button>
      <div class="status" id="aMsg"></div>
    </div>
  </div>
  <!-- 현황 -->
  <div id="tStatus" class="hidden">
    <div class="card"><label>기준일</label><input id="sDate" type="date" onchange="loadStatus()"><div class="muted" id="sSummary" style="margin-top:8px;"></div></div>
    <div id="statusList"></div>
  </div>
  <!-- 시험범위 -->
  <div id="tScope" class="hidden">
    <div class="card hidden" id="subInbox">
      <div class="sc-head"><b>학생 제출 시험범위 (승인 대기)</b><span class="badge b-no hidden" id="subBadge"></span></div>
      <div id="subListBox"></div>
    </div>
    <div class="card hidden" id="briefInbox">
      <div class="sc-head"><b>학생 브리핑 (시험범위 변경)</b><span class="badge b-no hidden" id="briefBadge"></span></div>
      <div id="briefListBox"></div>
    </div>
    <div class="card">
      <div class="sc-head"><b id="scFormTitle">새 시험범위</b><span class="sc-mini" id="scEditId"></span><span style="margin-left:auto;"><button class="sc-del" onclick="newScope()" style="background:var(--surface);color:var(--brand);border-color:var(--brand-line);">새로 작성</button></span></div>
      <div class="row"><div><label>학교</label><select id="scSchool"><option value="">학교 선택</option></select></div><div><label>학년</label><select id="scGrade"><option>고1</option><option>고2</option><option>고3</option><option>중1</option><option>중2</option><option>중3</option></select></div></div>
      <div class="row" style="margin-top:8px;"><div><label>시험명</label><select id="scExam"><option>1학기 중간고사</option><option>1학기 기말고사</option><option>2학기 중간고사</option><option>2학기 기말고사</option></select></div><div><label>시험일</label><input id="scDate" type="date"></div></div>
      <label style="margin-top:10px;">시험범위 항목</label>
      <div id="scItems"></div>
      <button class="btn btn-ghost" onclick="addScopeItem()" style="margin-top:2px;"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>항목 추가</button>
      <button class="btn" id="scSaveBtn" onclick="saveScope()"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>저장</button>
      <div class="status" id="scMsg"></div>
    </div>
    <div class="sc-mini" style="margin:4px 2px;">저장된 시험범위</div>
    <div id="scList"></div>
  </div>
</div>
</div>

<script>
const LOGIN_API='https://script.google.com/macros/s/AKfycbweOghTKXDAReQ_XCNriiYoErA_53b-0JHiFoKyUqJ-NL7DuGrP0BFMbupXAwPi2kP3oA/exec';
const TOKEN='adot2026classroom';
// ★HW_API: 숙제 전용 백엔드(별도 Apps Script). 로그인은 LOGIN_API(단어 백엔드), 숙제 데이터는 여기.
const HW_API='https://script.google.com/macros/s/AKfycbx1M1lbLNpnKuhEdakjx5S7LL6jnbKSzv6PAZn5k9-zaGMD7AN6PyqJrcP3tC2IdcZ1/exec';
// ★선생님 로그인(학생 명단엔 선생님이 없어 프론트에서 허용목록으로 처리). 아이디 끝 'T' = 선생님.
const TEACHERS={'상균T':'신상균','shinsg0103':'신상균'};
let user=null, isTeacher=false, roster=[];

function jsonp(url){return new Promise(function(res){var fn='__cb'+Math.floor(Math.random()*1e9);var s=document.createElement('script');var done=false;var cu=function(){try{delete window[fn]}catch(e){}if(s.parentNode)s.remove();};window[fn]=function(o){if(done)return;done=true;cu();res(o);};s.onerror=function(){if(done)return;done=true;cu();res(null);};s.src=url+(url.indexOf('?')<0?'?':'&')+'callback='+fn;document.body.appendChild(s);setTimeout(function(){if(!done){done=true;cu();res(null);}},9000);});}

var gselDrag=null;
function gselCells(g){return [].slice.call(g.querySelectorAll('.gcell-s'));}
function gridSelHtml(cells,selNums,sfx,hint){
  var c=cells.map(function(v){var on=selNums&&selNums[parseInt(v)];var lbl=/^\d+(~\d+)?$/.test(String(v))?(String(v)+sfx):String(v);return '<span class="gcell-s'+(on?' on':'')+'" data-v="'+esc(String(v))+'" onpointerdown="gselStart(event,this)" onpointerenter="gselEnter(this)">'+esc(lbl)+'</span>';}).join('');
  var n=cells.filter(function(v){return selNums&&selNums[parseInt(v)];}).length;
  return '<div class="gsel" data-suffix="'+esc(sfx)+'">'+(hint?'<div class="gsel-hint">'+esc(hint)+'</div>':'')+'<div class="gsel-bar"><button type="button" class="gsel-all" onclick="gselAll(this)">전체 선택</button><span class="gsel-info">'+(n?n+'개 선택':'드래그로 선택')+'</span></div><div class="gsel-cells">'+c+'</div></div>';

function gselStart(e,cell){var g=cell.closest('.gsel');var idx=gselCells(g).indexOf(cell);gselDrag={g:g,start:idx,on:!cell.classList.contains('on')};gselApply(g,idx,idx,gselDrag.on);if(e.cancelable)e.preventDefault();}
function gselEnter(cell){if(!gselDrag)return;var g=cell.closest('.gsel');if(g!==gselDrag.g)return;gselApply(g,gselDrag.start,gselCells(g).indexOf(cell),gselDrag.on);}
function gselMoveEv(e){if(!gselDrag)return;var t=document.elementFromPoint(e.clientX,e.clientY);var cell=(t&&t.closest)?t.closest('.gcell-s'):null;if(!cell||cell.closest('.gsel')!==gselDrag.g)return;gselApply(gselDrag.g,gselDrag.start,gselCells(gselDrag.g).indexOf(cell),gselDrag.on);}
function gselEndEv(){if(gselDrag){gselInfo(gselDrag.g);gselDrag=null;}}
function gselApply(g,a,b,on){var cells=gselCells(g),lo=Math.min(a,b),hi=Math.max(a,b);for(var i=lo;i<=hi;i++)cells[i].classList.toggle('on',on);gselInfo(g);}
function gselAll(btn){var g=btn.closest('.gsel'),cells=gselCells(g),allOn=cells.every(function(c){return c.classList.contains('on');});cells.forEach(function(c){c.classList.toggle('on',!allOn);});gselInfo(g);}
function gselInfo(g){var n=gselCells(g).filter(function(c){return c.classList.contains('on');}).length;var i=g.querySelector('.gsel-info');if(i)i.textContent=n?n+'개 선택':'드래그로 선택';}
function gridRange(g){var cells=gselCells(g),onIdx=[];cells.forEach(function(c,i){if(c.classList.contains('on'))onIdx.push(i);});if(!onIdx.length)return '';var sfx=g.getAttribute('data-suffix')||'';var contig=onIdx.every(function(v,i){return i===0||v===onIdx[i-1]+1;});function lead(s){var m=s.match(/^\d+/);return m?m[0]:s;}function trail(s){var m=s.match(/(\d+)\s*$/);return m?m[1]:s;}if(contig){var f=cells[onIdx[0]].getAttribute('data-v'),l=cells[onIdx[onIdx.length-1]].getAttribute('data-v');return onIdx.length===1?(f+sfx):(lead(f)+'~'+trail(l)+sfx);}return onIdx.map(function(i){return cells[i].getAttribute('data-v');}).join(',')+sfx;}
function rangeToNums(range){var nums={};String(range||'').split(/[,，]/).forEach(function(p){var m=p.match(/(\d+)\s*[~\-]\s*(\d+)/);if(m){for(var i=+m[1];i<=+m[2];i++)nums[i]=1;}else{var s=p.match(/\d+/g);if(s)s.forEach(function(n){nums[+n]=1;});}});return nums;}

var progFlat={};
// 모의고사 문항범위 펼침: 18~45 → 18,19,…,40,41~42,43~45 (영어 장문 묶음)
function expandQnums(rng){
  var out=[];
  String(rng||'').split(/[,，]/).forEach(function(p){
    p=p.trim(); if(!p)return;
    var m=p.match(/(\d+)\s*[~\-]\s*(\d+)/);
    if(m){ var a=+m[1],b=+m[2];
      for(var i=a;i<=b;i++){
        if(i===41&&b>=42){ out.push('41~42'); i=42; continue; }
        if(i===43&&b>=45){ out.push('43~45'); i=45; continue; }
        out.push(String(i));
      }
    } else { var s=p.match(/\d+/); if(s)out.push(s[0]); }
  });
  return out.length?out:[String(rng||'전체')];
}
// 수능특강 Light 영어 강별 지문 구성(G=Gateway). 미등록 강은 기본 G+1~4.
var LIGHT_PASSAGES={1:['G','1','2','3','4'],2:['G','1','2','3','4'],3:['G','1','2','3','4'],4:['G','1','2','3','4'],5:['G','1','2','3','4'],6:['G','1','2','3','4'],7:['G','1','2','3','4'],8:['G','1','2','3','4'],9:['G','1','2','3','4'],10:['G','1','2','3','4','5'],11:['G','1','2','3','4'],12:['G','1','2','3','4','5','6'],13:['G','1','2','3','4'],14:['G','1','2','3','4'],15:['G','1~2','3~4'],16:['G','1~3','4~6'],17:['G','1','2','3','4'],18:['G','1','2','3','4'],19:['G','1','2','3','4'],20:['G','1','2','3','4'],21:['G','1','2','3','4'],22:['G','1','2','3','4']};
function bookPassages(n){ return LIGHT_PASSAGES[n]||['G','1','2','3','4']; }
// 범위를 개별 단위로 펼침(모의고사=연도그룹별 문항그리드, 수능특강Light=강별 지문그리드, 그 외=강/과 칩)
function expandUnits(it){
  var type=it.type||'', src=(it.source||'').trim(), rng=(it.range||'').trim(), units=[];
  if(type==='모의고사'){
    var ym=src.match(/(\d{2}(?:\s*[·,]\s*\d{2})*)\s*년/);
    var base=src.replace(/\(?\s*\d{2}(?:\s*[·,]\s*\d{2})*\s*년\s*\)?/,'').replace(/[()]/g,'').trim()||'모의고사';
    var years=ym?ym[1].split(/[·,]/).map(function(x){return x.trim();}).filter(Boolean):[''];
    var qs=expandQnums(rng);
    years.forEach(function(y){ var grp=(y?y+'년 ':'')+base; qs.forEach(function(q){ units.push({name:String(q),group:grp,q:true}); }); });
    return units;
  }
  if(type==='부교재' && it._f && it._f.passages && Object.keys(it._f.passages).length){
    var sp=it._f.passages;
    Object.keys(sp).map(Number).sort(function(a,b){return a-b;}).forEach(function(n){ var grp=src+' '+n+'강'; (sp[n]||[]).forEach(function(p){ units.push({name:String(p),group:grp,q:true}); }); });
    if(units.length) return units;
  }
  if(type==='부교재' && /수능특강\s*(light|라이트)/i.test(src)){
    var ln=[], mm=rng.match(/(\d+)\s*[~\-]\s*(\d+)/);
    if(mm){ var la=+mm[1],lb=+mm[2]; if(lb>=la&&lb-la<60){ for(var li=la;li<=lb;li++)ln.push(li); } }
    else { var sx=rng.match(/\d+/g); if(sx)ln=sx.map(Number); }
    ln.forEach(function(n){ var grp=src+' '+n+'강'; bookPassages(n).forEach(function(p){ units.push({name:p,group:grp,q:true}); }); });
    if(units.length) return units;
  }
  var suffix=/과/.test(rng)?'과':(/강/.test(rng)?'강':(/회/.test(rng)?'회':(/번/.test(rng)?'번':'')));
  var nums=[],m=rng.match(/(\d+)\s*[~\-]\s*(\d+)/);
  if(m){ var a=+m[1],b=+m[2]; if(b>=a&&b-a<300){ for(var i=a;i<=b;i++)nums.push(i); } }
  else { var s=rng.match(/\d+/g); if(s)nums=s.map(Number); }
  if(nums.length){ nums.forEach(function(n){ units.push({name:(src?src+' ':'')+n+suffix,group:'',q:false}); }); }
  else { units.push({name:((src+' '+rng).trim())||type,group:'',q:false}); }
  return units;
}

  if(!msg){st.className='status err';st.textContent='내용을 입력하세요';return;}
  var b=document.getElementById('briefBtn');b.disabled=true;st.textContent='';
  post({action:'briefSend',id:user.id,name:user.name,school:document.getElementById('ssSchool').value.trim(),grade:document.getElementById('ssGrade').value,message:msg}).then(function(j){
    b.disabled=false;
    if(j&&j.ok){st.className='status ok';st.textContent='선생님께 전달했어요! 곧 반영됩니다.';document.getElementById('briefMsg').value='';}
    else{st.className='status err';st.textContent='실패: '+((j&&j.error)||'');}
  });
}
// 학생 → 시험범위 직접 작성 후 제출(선생님 승인 시 등록)
function ssSubWho(){var sc=(myInfo&&myInfo.school)||document.getElementById('ssSchool').value.trim();var gr=(myInfo&&myInfo.grade)||document.getElementById('ssGrade').value;return {school:sc,grade:gr};}
function ssSubToggle(){
  var b=document.getElementById('ssSubBody'),btn=document.getElementById('ssSubToggle');
  var hidden=b.classList.toggle('hidden'); btn.textContent=hidden?'작성하기':'접기';
  if(!hidden){
    if(!document.getElementById('ssSubItems').children.length)addScopeItem(null,'ssSubItems');
    var w=ssSubWho();document.getElementById('ssSubWho').innerHTML='<span class="sf-tag">'+esc((w.school||'학교 미확인')+' '+(w.grade||''))+'</span> 기준으로 올라가요';
  }
}
function ssSubmit(){
  var w=ssSubWho(), m=document.getElementById('ssSubMsg');
  if(!w.school){m.className='status err';m.textContent='학교 정보가 없어요. 위에서 학교를 먼저 확인해주세요.';return;}
  var items=collectScope('ssSubItems');
  if(!items.length){m.className='status err';m.textContent='시험범위 항목을 하나 이상 입력해주세요.';return;}
  var b=document.getElementById('ssSubBtn');b.disabled=true;m.textContent='';
  post({action:'scopeSubmit',id:user.id,name:user.name,school:w.school,grade:w.grade,examName:document.getElementById('ssSubExam').value,examDate:document.getElementById('ssSubDate').value,items:JSON.stringify(items)}).then(function(j){
    b.disabled=false;
    if(j&&j.ok){m.className='status ok';m.textContent='올렸어요! 선생님이 승인하면 시험범위에 등록됩니다.';document.getElementById('ssSubItems').innerHTML='';addScopeItem(null,'ssSubItems');}
    else{m.className='status err';m.textContent='실패: '+((j&&j.error)||'');}
  });
}
// 선생님 시험범위 탭 알림 점(브리핑+제출 합산)
var briefNew=0, subNew=0;
function updateScopeDot(){var dot=document.getElementById('briefDot');if(!dot)return;var t=briefNew+subNew;if(t>0){dot.textContent=t;dot.classList.remove('hidden');}else{dot.classList.add('hidden');}}
// 선생님 학생 제출 승인함
function loadSubs(){
  if(!isTeacher)return;
  jsonp2(HW_API+'?action=scopeSubmitList&token='+TOKEN+'&id='+encodeURIComponent(user.id)).then(function(j){
    var subs=(j&&j.subs)||[]; subNew=(j&&j.newCount)||0; updateScopeDot();
    var inbox=document.getElementById('subInbox'); if(!inbox)return;
    var box=document.getElementById('subListBox'),badge=document.getElementById('subBadge');
    var pend=subs.filter(function(s){return s.status==='대기';});
    if(!pend.length){inbox.classList.add('hidden');return;}
    inbox.classList.remove('hidden');
    badge.textContent='대기 '+pend.length;badge.classList.remove('hidden');
    box.innerHTML=pend.map(subCard).join('');
  });
}
function subCard(u){
  var items=[];try{items=JSON.parse(u.items||'[]');}catch(e){}
  var rows=items.map(function(it){return '<div class="sc-row"><span class="sc-tp">'+esc(it.type||'')+'</span><span style="flex:1;"><span class="sc-src">'+esc(it.source||'')+'</span>'+(it.range?' <span class="sc-mini">'+esc(it.range)+'</span>':'')+'</span>'+statusBadge(it.status)+'</div>';}).join('')||'<div class="sc-mini" style="padding:5px 0;">항목 없음</div>';
  return '<div class="hw" style="border-color:var(--accent-line);background:var(--accent-soft);"><div class="hw-top"><span class="hw-title">'+esc(u.stuName)+' <span class="sc-mini">'+esc(u.school)+' '+esc(u.grade)+(u.examName?' · '+esc(u.examName):'')+(u.examDate?' · '+esc(u.examDate):'')+'</span></span><span class="badge b-no">대기</span></div><div style="margin:6px 0;">'+rows+'</div><div class="hw-meta">'+esc(u.at)+' 제출</div><div class="row" style="margin-top:8px;"><button class="btn btn-ok" onclick="approveSub(\''+u.id+'\')"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>승인 → 등록</button><button class="btn btn-ghost" onclick="rejectSub(\''+u.id+'\')">반려</button></div></div>';
}
function approveSub(id){post({action:'scopeApprove',byId:user.id,byName:user.name,id:id}).then(function(j){if(j&&j.ok){loadSubs();loadScopeList();}else alert('실패: '+((j&&j.error)||''));});}
function rejectSub(id){if(!confirm('이 제출을 반려할까요?'))return;post({action:'scopeSubReject',byId:user.id,id:id,status:'반려'}).then(function(j){if(j&&j.ok)loadSubs();else alert('실패');});}
// 선생님 브리핑 알림함
function loadBriefs(){
  if(!isTeacher)return;
  jsonp2(HW_API+'?action=briefList&token='+TOKEN+'&id='+encodeURIComponent(user.id)).then(function(j){
    var briefs=(j&&j.briefs)||[], nc=(j&&j.newCount)||0;
    briefNew=nc; updateScopeDot();
    var inbox=document.getElementById('briefInbox'); if(!inbox)return;
    var box=document.getElementById('briefListBox'), badge=document.getElementById('briefBadge');
    if(!briefs.length){inbox.classList.add('hidden');return;}
    inbox.classList.remove('hidden');
    if(nc>0){badge.textContent='신규 '+nc;badge.classList.remove('hidden');}else{badge.classList.add('hidden');}
    box.innerHTML=briefs.map(function(b){
      var isNew=b.status==='신규';
      return '<div class="hw"'+(isNew?' style="border-color:var(--danger-line);background:var(--danger-soft);"':'')+'><div class="hw-top"><span class="hw-title">'+esc(b.stuName)+' <span class="sc-mini">'+esc(b.school)+' '+esc(b.grade)+'</span></span>'+(isNew?'<span class="badge b-no">신규</span>':'<span class="badge b-ok">처리됨</span>')+'</div><div class="hw-meta" style="font-size:13.5px;color:var(--ink);">'+esc(b.msg)+'</div><div class="hw-meta">'+esc(b.at)+'</div>'+(isNew?'<button class="btn btn-ghost" style="margin-top:6px;" onclick="handleBrief(\''+b.id+'\')">확인 완료</button>':'')+'</div>';
    }).join('');
  });
}
function handleBrief(id){post({action:'briefHandle',byId:user.id,id:id,status:'처리됨'}).then(function(j){if(j&&j.ok)loadBriefs();else alert('실패');});}
</script></body></html>
